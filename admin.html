<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Ledger — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<div class="wrap">
  <header class="site-head">
    <span class="eyebrow">Private</span>
    <h1>Admin</h1>
    <p>Add, edit, or remove entries in the archive.</p>
    <nav class="top-nav"><a href="index.html">← Back to archive</a></nav>
  </header>

  <div id="login-panel" class="panel" style="max-width:380px;margin-top:32px;">
    <h2>Sign in</h2>
    <form id="login-form">
      <label for="login-email">Email</label>
      <input type="email" id="login-email" required>
      <label for="login-password">Password</label>
      <input type="password" id="login-password" required>
      <button type="submit">Sign in</button>
      <div id="login-msg" class="msg hidden"></div>
    </form>
    <p style="font-family:var(--font-mono);font-size:11px;color:var(--text-dim);margin-top:16px;">
      Create your admin user in Supabase → Authentication → Users. See README.md.
    </p>
  </div>

  <div id="admin-area" class="hidden" style="margin-top:32px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <span style="font-family:var(--font-mono);font-size:12px;color:var(--text-dim);">
        Signed in as <span id="whoami"></span>
      </span>
      <button id="logout-btn" class="ghost" style="margin:0;">Sign out</button>
    </div>

    <div class="panel">
      <h2 id="form-title">Add entry</h2>
      <form id="record-form">
        <label for="title">Title</label>
        <input type="text" id="title" required>

        <label for="description">Description</label>
        <textarea id="description"></textarea>

        <div class="row">
          <div>
            <label for="category">Category</label>
            <input type="text" id="category" placeholder="e.g. reports, photos">
          </div>
          <div>
            <label for="file">File (optional)</label>
            <input type="file" id="file">
          </div>
        </div>

        <button type="submit">Save entry</button>
        <button type="button" id="reset-form" class="ghost">Clear / new entry</button>
        <div id="form-msg" class="msg hidden"></div>
      </form>
    </div>

    <h2 style="font-family:var(--font-display);font-size:18px;">All entries</h2>
    <div id="admin-list" class="admin-list"></div>
  </div>

  <footer class="site-foot">The Ledger — admin panel.</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/config.js"></script>
<script src="assets/admin.js"></script>
</body>
</html>
